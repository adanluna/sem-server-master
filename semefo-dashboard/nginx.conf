server {
  listen 80;
  server_name _;

  # Seguridad básica (puedes endurecer luego)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;

  root /usr/share/nginx/html;
  index index.html;

  # Vue Router (history mode): fallback a index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy a FastAPI: /api/dashboard/login → /dashboard/login (router principal).
  # NO usar proxy_pass con variables: no reescribe URI y rompe login (405/500).
  # Tras recrear contenedor fastapi, si hay 502: docker compose restart dashboard
  location ^~ /api/ {
    proxy_pass http://fastapi:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 120s;
  }
}
